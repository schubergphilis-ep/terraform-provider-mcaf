# WARNING: This file is managed automatically and may be overwritten at any time.

name: Release

on:
  push:
    branches: [main, master]

permissions: {}

jobs:
  Release:
    uses: schubergphilis-ep/github-terraform-workflows/.github/workflows/provider-release.yaml@4dc535b5b0d6a4466cd6a43b87b802dd8591c0e6 # v2.1.3
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets:
      gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
